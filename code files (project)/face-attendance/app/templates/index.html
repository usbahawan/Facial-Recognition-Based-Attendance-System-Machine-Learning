<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Attendance Dashboard</title>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background-color: #f4f4f9;
      text-align: center;
      padding: 30px;
    }
    h1 {
      color: #333;
    }
    table {
      margin: 20px auto;
      border-collapse: collapse;
      width: 90%;
      max-width: 700px;
      box-shadow: 0px 2px 6px rgba(0,0,0,0.1);
      background-color: white;
      border-radius: 10px;
      overflow: hidden;
    }
    th, td {
      padding: 12px;
      border-bottom: 1px solid #ddd;
    }
    th {
      background-color: #007bff;
      color: white;
    }
    tr:hover {
      background-color: #f1f1f1;
    }
    .refresh-btn {
      background: #007bff;
      color: white;
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
    }
    .refresh-btn:hover {
      background: #0056b3;
    }
  </style>
</head>
<body>
  <h1>📋 Attendance Dashboard</h1>
  <button class="refresh-btn" onclick="window.location.reload()">🔄 Refresh</button>
  <table>
    <thead>
      <tr>
        <th>Name</th>
        <th>Date</th>
        <th>Time</th>
      </tr>
    </thead>
    <tbody>
      {% for name, date, time in records %}
      <tr>
        <td>{{ name }}</td>
        <td>{{ date }}</td>
        <td>{{ time }}</td>
      </tr>
      {% else %}
      <tr><td colspan="3">No records found</td></tr>
      {% endfor %}
    </tbody>
  </table>
</body>
</html>
